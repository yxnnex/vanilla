<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vanilla Unicorn – Calculadora de Insumos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Pangolin', cursive; 
            background: #000; 
            color: #ffb6e6; 
            margin: 0; 
            padding: 10px; 
            font-size: 18px; 
        }
        
        h1 { text-align: center; margin: 5px 0 10px 0; font-size: 30px; color: #ffb6e6; }
        .logo { display: block; margin: 0 auto 5px auto; width: 140px; filter: drop-shadow(0 0 8px rgba(255,182,230,0.8)); }
        
        table { 
            width: 95%; 
            max-width: 900px;
            margin: 0 auto;
            border-collapse: collapse; 
            background: rgba(255, 182, 230, 0.1); 
            border-radius: 12px; 
            overflow: hidden; 
        }
        
        th { background: rgba(255, 182, 230, 0.2); padding: 10px; font-size: 20px; }
        td { padding: 12px; text-align: center; } 
        tr:nth-child(even) { background: rgba(255, 182, 230, 0.08); }

        .input { 
            width: 100px; 
            padding: 5px; 
            border-radius: 6px; 
            border: none; 
            text-align: center; 
            background: rgba(255,182,230,0.8); 
            color: #000; 
            font-weight: bold;
            font-family: 'Pangolin', cursive;
            font-size: 16px;
        }
        
        .container-buttons { text-align: center; margin-top: 25px; margin-bottom: 30px; }

        button { 
            width: 160px; 
            height: 55px;
            color: #000; 
            font-size: 22px; 
            font-weight: bold;
            font-family: 'Pangolin', cursive;
            border: 2px solid #ffb6e6; 
            border-radius: 15px; 
            cursor: pointer; 
            margin: 0 10px;
            transition: 0.3s;
            background-color: #ffb6e6;
            box-shadow: 0 0 10px rgba(255,182,230,0.4);
        }

        button:hover { 
            transform: scale(1.05); 
            filter: brightness(1.1);
        }

        .btn-limpiar {
            filter: hue-rotate(320deg);
        }
    </style>
</head>
<body>
    <img src="VU_LOGO_OFFICIAL.png" class="logo" alt="Vanilla Unicorn">
    <h1>Calculadora para stock – Vanilla Unicorn</h1>
    
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Stock actual</th>
                <th>Stock deseado</th>
                <th>Faltante</th>
                <th>Insumos necesarios</th>
                <th><span style="font-size:12px;color:#bbb;font-style:italic;">Ingrediente a sacar</span></th>
            </tr>
        </thead>
        <tbody id="tabla-cuerpo">
            <tr><td>Jugo de Naranja</td><td><input class="input" id="naranjaStock" placeholder="0"></td><td><input class="input" id="naranjaMeta" value="900"></td><td id="naranjaFaltante">0</td><td id="naranjaInsumo">0</td><td>Naranjas</td></tr>
            <tr><td>Jugo de Manzana</td><td><input class="input" id="manzanaStock" placeholder="0"></td><td><input class="input" id="manzanaMeta" value="900"></td><td id="manzanaFaltante">0</td><td id="manzanaInsumo">0</td><td>Manzanas</td></tr>
            <tr><td>Jugo de Piña</td><td><input class="input" id="pinaStock" placeholder="0"></td><td><input class="input" id="pinaMeta" value="900"></td><td id="pinaFaltante">0</td><td id="pinaInsumo">0</td><td>Piñas</td></tr>
            <tr><td>Jugo de Arándanos</td><td><input class="input" id="arandanoStock" placeholder="0"></td><td><input class="input" id="arandanoMeta" value="900"></td><td id="arandanoFaltante">0</td><td id="arandanoInsumo">0</td><td>Arándanos</td></tr>
        </tbody>
    </table>

    <div class="container-buttons">
        <button onclick="calcularTodo()">Calcular</button>
        <button class="btn-limpiar" onclick="limpiarTodo()">Limpiar</button>
    </div>

    <script>
        const productos = ["naranja", "manzana", "pina", "arandano"];

        function calcularTodo() {
            productos.forEach(p => {
                // He mantenido el factor 0.5 (50/100) que tenían los jugos en tu código original
                calcular(p, 0.5);
            });
        }

        function calcular(nombre, factor) {
            let stock = parseInt(document.getElementById(nombre + "Stock").value) || 0;
            let meta = parseInt(document.getElementById(nombre + "Meta").value) || 0;
            let faltante = meta - stock;
            if (faltante < 0) faltante = 0;
            
            let insumo = faltante * factor;
            let insumoText = (insumo % 1 === 0) ? insumo.toString() : insumo.toFixed(1);
            
            document.getElementById(nombre + "Faltante").innerText = faltante;
            document.getElementById(nombre + "Insumo").innerText = insumoText;
        }

        function limpiarTodo() {
            productos.forEach(p => {
                document.getElementById(p + "Stock").value = "";
                document.getElementById(p + "Faltante").innerText = "0";
                document.getElementById(p + "Insumo").innerText = "0";
            });
        }
    </script>
</body>
</html>
