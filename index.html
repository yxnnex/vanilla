<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vanilla Unicorn – Calculadora de Insumos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Pangolin', cursive; 
            background: #050505; 
            color: #ff71ce; /* Rosa Neón */
            margin: 0; 
            padding: 10px; 
            font-size: 18px; 
        }
        
        h1 { 
            text-align: center; 
            margin: 10px 0 20px 0; 
            font-size: 35px; 
            color: #fff; 
            text-shadow: 0 0 10px #ff71ce, 0 0 20px #ff71ce, 0 0 30px #ff71ce;
        }

        .logo { 
            display: block; 
            margin: 20px auto; 
            width: 160px; 
            filter: drop-shadow(0 0 15px rgba(255, 113, 206, 0.9)); 
        }
        
        table { 
            width: 95%; 
            max-width: 900px;
            margin: 0 auto;
            border-collapse: separate;
            border-spacing: 0 8px;
            background: transparent;
        }
        
        th { 
            background: rgba(255, 113, 206, 0.15); 
            padding: 15px; 
            font-size: 20px; 
            color: #fff;
            text-shadow: 0 0 5px #ff71ce;
            border-bottom: 2px solid #ff71ce;
        }

        td { 
            padding: 12px; 
            text-align: center; 
            background: rgba(20, 20, 20, 0.8);
            border-top: 1px solid rgba(255, 113, 206, 0.3);
            border-bottom: 1px solid rgba(255, 113, 206, 0.3);
        }

        td:first-child { border-left: 1px solid rgba(255, 113, 206, 0.3); border-radius: 10px 0 0 10px; }
        td:last-child { border-right: 1px solid rgba(255, 113, 206, 0.3); border-radius: 0 10px 10px 0; }

        .input { 
            width: 100px; 
            padding: 8px; 
            border-radius: 8px; 
            border: 1px solid #ff71ce; 
            text-align: center; 
            background: #1a1a1a; 
            color: #fff; 
            font-weight: bold;
            font-family: 'Pangolin', cursive;
            font-size: 18px;
            box-shadow: inset 0 0 5px #ff71ce;
            transition: 0.3s;
        }

        .input:focus {
            outline: none;
            box-shadow: 0 0 10px #ff71ce, inset 0 0 5px #ff71ce;
        }
        
        .container-buttons { text-align: center; margin-top: 30px; margin-bottom: 40px; }

        button { 
            width: 180px; 
            height: 60px;
            color: #fff; 
            font-size: 24px; 
            font-weight: bold;
            font-family: 'Pangolin', cursive;
            border: 2px solid #ff71ce; 
            border-radius: 20px; 
            cursor: pointer; 
            margin: 0 15px;
            transition: 0.3s;
            background: rgba(255, 113, 206, 0.1);
            box-shadow: 0 0 15px rgba(255, 113, 206, 0.4);
            text-shadow: 0 0 8px #ff71ce;
        }

        button:hover { 
            background: #ff71ce;
            color: #000;
            box-shadow: 0 0 30px #ff71ce;
            transform: translateY(-3px);
        }

        .btn-limpiar {
            border-color: #b967ff; /* Tono morado para variar */
            text-shadow: 0 0 8px #b967ff;
            box-shadow: 0 0 15px rgba(185, 103, 255, 0.4);
        }

        .btn-limpiar:hover {
            background: #b967ff;
            box-shadow: 0 0 30px #b967ff;
        }

        #naranjaFaltante, #manzanaFaltante, #pinaFaltante, #arandanoFaltante,
        #naranjaInsumo, #manzanaInsumo, #pinaInsumo, #arandanoInsumo {
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px #ff71ce;
        }
    </style>
</head>
<body>
    <img src="VU_LOGO_OFFICIAL.png" class="logo" alt="Vanilla Unicorn">
    <h1>Calculadora de Stock</h1>
    
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Stock actual</th>
                <th>Stock deseado</th>
                <th>Faltante</th>
                <th>Insumos</th>
                <th><span style="font-size:12px;color:#bbb;font-style:italic;">Sacar de heladera</span></th>
            </tr>
        </thead>
        <tbody id="tabla-cuerpo">
            <tr><td>Jugo de Naranja</td><td><input class="input" id="naranjaStock" placeholder="0"></td><td><input class="input" id="naranjaMeta" value="900"></td><td id="naranjaFaltante">0</td><td id="naranjaInsumo">0</td><td>Naranjas</td></tr>
            <tr><td>Jugo de Manzana</td><td><input class="input" id="manzanaStock" placeholder="0"></td><td><input class="input" id="manzanaMeta" value="900"></td><td id="manzanaFaltante">0</td><td id="manzanaInsumo">0</td><td>Manzanas</td></tr>
            <tr><td>Jugo de Piña</td><td><input class="input" id="pinaStock" placeholder="0"></td><td><input class="input" id="pinaMeta" value="900"></td><td id="pinaFaltante">0</td><td id="pinaInsumo">0</td><td>Piñas</td></tr>
            <tr><td>Jugo de Arándanos</td><td><input class="input" id="arandanoStock" placeholder="0"></td><td><input class="input" id="arandanoMeta" value="900"></td><td id="arandanoFaltante">0</td><td id="arandanoInsumo">0</td><td>Arándanos</td></tr>
        </tbody>
    </table>

    <div class="container-buttons">
        <button onclick="calcularTodo()">CALCULAR</button>
        <button class="btn-limpiar" onclick="limpiarTodo()">LIMPIAR</button>
    </div>

    <script>
        const productos = ["naranja", "manzana", "pina", "arandano"];

        function calcularTodo() {
            productos.forEach(p => {
                calcular(p, 0.5);
            });
        }

        function calcular(nombre, factor) {
            let stock = parseInt(document.getElementById(nombre + "Stock").value) || 0;
            let meta = parseInt(document.getElementById(nombre + "Meta").value) || 0;
            let faltante = meta - stock;
            if (faltante < 0) faltante = 0;
            
            let insumo = faltante * factor;
            let insumoText = (insumo % 1 === 0) ? insumo.toString() : insumo.toFixed(1);
            
            document.getElementById(nombre + "Faltante").innerText = faltante;
            document.getElementById(nombre + "Insumo").innerText = insumoText;
        }

        function limpiarTodo() {
            productos.forEach(p => {
                document.getElementById(p + "Stock").value = "";
                document.getElementById(p + "Faltante").innerText = "0";
                document.getElementById(p + "Insumo").innerText = "0";
            });
        }
    </script>
</body>
</html>
